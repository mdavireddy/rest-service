

name: Dummy

on:
  push:
    branches: [ "main1" ]  

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Build with Maven
      run: echo $HOME
      
  ServiceNowSecurityScanResults:
    runs-on: ubuntu-latest
    name: ServiceNow Security Scan Results
    steps:
      - name: ServiceNow DevOps Security Results
        uses: ServiceNow/servicenow-devops-security-result@v3.1.0
        with:
            devops-integration-token: ${{ secrets.SNOW_TOKEN }}  
            instance-url:  ${{ secrets.SN_INSTANCE_URL }}
            tool-id: ${{ secrets.SNOW_TOOLID }}
            context-github: ${{ toJSON(github) }}
            job-name: 'ServiceNow Security Scan Results'
            security-result-attributes: '{"scanner": "Veracode", "applicationName": "PetStoreAPI-Github", "buildVersion": "", "securityToolId": ""}'
            
